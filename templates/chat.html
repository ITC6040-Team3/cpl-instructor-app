<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CPL Chat</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; }
      textarea { width: 100%; height: 120px; }
      input[type="file"] { flex: 1; }
      pre { white-space: pre-wrap; padding: 12px; border: 1px solid #ddd; }
      .row { display: flex; gap: 12px; align-items: center; }
    </style>
  </head>
  <body>
    <h2>CPL Chat Demo</h2>
    <p>Type a prompt and call Azure OpenAI through the Web App.</p>

    <textarea id="msg" placeholder="Ask something..."></textarea>
    <br/><br/>
    <div class="row">
      <button id="send">Send</button>
      <span id="status"></span>
    </div>

    <div class="row" style="margin-top: 12px;">
      <input id="file" type="file" />
      <button id="upload">Upload</button>
    </div>

    <h3>Uploads (current session)</h3>
    <pre id="uploadsList"></pre>

    <h3>Response</h3>
    <pre id="out"></pre>

    <script src="/static/chat.js"></script>
  </body>
</html>
